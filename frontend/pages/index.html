<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT-Sum AI | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <div class="brand">YT-Sum AI</div>
        <nav class="nav">
          <a href="/">Home</a><a href="/processing">Processing</a><a href="/transcript">Transcript</a>
          <a href="/summary">Summary</a><a href="/translation">Translation</a><a href="/audio-summary">Audio</a>
          <a href="/analytics">Analytics</a><a href="/history">History</a><a href="/settings">Settings</a>
        </nav>
      </header>

      <section class="hero">
        <h1>YouTube to Transcript, Summary, Translation, and Voice</h1>
        <p class="status">Paste a URL and run the full AI pipeline from audio extraction to summary playback.</p>
      </section>

      <section class="card">
        <form id="processForm">
          <div class="grid">
            <div>
              <label for="videoUrl">YouTube URL</label>
              <input id="videoUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
            </div>
            <div>
              <label for="summaryType">Summary Type</label>
              <select id="summaryType">
                <option value="extractive">Extractive</option>
                <option value="abstractive">Abstractive</option>
              </select>
            </div>
            <div>
              <label for="summaryLength">Summary Length (sentences)</label>
              <input id="summaryLength" type="number" min="2" max="12" value="4" />
            </div>
            <div>
              <label for="summaryModel">Summarization Model</label>
              <input id="summaryModel" type="text" value="sshleifer/distilbart-cnn-12-6" />
            </div>
            <div>
              <label for="translationLanguage">Translation Language</label>
              <select id="translationLanguage">
                <option value="">No translation</option>
                <option value="ta">Tamil</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
              </select>
            </div>
            <div>
              <label for="ttsLanguage">Audio Output Language</label>
              <select id="ttsLanguage">
                <option value="">Auto</option>
                <option value="en">English</option>
                <option value="ta">Tamil</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
              </select>
            </div>
          </div>
          <p id="formStatus" class="status">Ready.</p>
          <button type="submit">Start Processing</button>
        </form>
      </section>
    </main>
    <script src="/assets/js/app.js"></script>
    <script>
      byId("processForm").addEventListener("submit", processVideo);
    </script>
  </body>
</html>
