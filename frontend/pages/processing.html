<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT-Sum AI | Processing</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <div class="brand">YT-Sum AI</div>
        <nav class="nav">
          <a href="/">Home</a><a href="/processing">Processing</a><a href="/transcript">Transcript</a>
          <a href="/summary">Summary</a><a href="/translation">Translation</a><a href="/audio-summary">Audio</a>
          <a href="/analytics">Analytics</a><a href="/history">History</a><a href="/settings">Settings</a>

      <section class="card">
        <h2>Pipeline Progress</h2>
        <div class="progress-track">
          <div class="progress-step">1. YouTube audio extraction</div>
          <div class="progress-step">2. Speech-to-text (ASR)</div>
          <div class="progress-step">3. Transcript processing</div>
          <div class="progress-step">4. Summarization</div>
          <div class="progress-step">5. Translation (optional)</div>
          <div class="progress-step">6. Text-to-speech audio rendering</div>
        </div>
        <p id="processingStatus" class="status">Waiting for a request...</p>
      </section>
    </main>
    <script src="/assets/js/app.js"></script>
    <script>
      renderProcessingPage();
    </script>
